name: CI
permissions:
  contents: read
on:
  push: null
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun lint
      - name: Build
        run: bun build src/cli.ts --outdir dist --target node --format esm
      - name: Test
        run: bun test
